
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin: 20px 0 24px; }
        .btn { display:inline-block; padding: 10px 16px; border-radius: 6px; text-decoration:none; border:none; cursor:pointer; font-size: 14px; }
        .btn-primary { background:#4a90d9; color:#fff; }
        .btn-danger { background:#dc3545; color:#fff; }
        .btn-danger:hover { background:#c82333; }
        .btn-primary:hover { background:#357abd; }
        .message { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
        .message.success { background:#e9f7ef; color:#1e7e34; border:1px solid #b7e1c1; }
        .message.error { background:#fdecea; color:#b02a37; border:1px solid #f5c2c7; }
        table { width:100%; border-collapse:collapse; background:#fff; }
        thead th { text-align:left; background:#4a90d9; color:#fff; padding:12px 14px; }
        tbody td { padding:12px 14px; border-bottom:1px solid #e9ecef; }
        tbody tr:hover { background:#f8fbff; }
        .actions { display:flex; gap:8px; align-items:center; }
        .empty { padding: 28px 20px; text-align:center; border:1px dashed #cfd8e3; border-radius:8px; color:#6c757d; }
        .meta { margin-top: 16px; font-size: 13px; color:#6c757d; }
        .delete-form { margin:0; }
    </style>
</head>
<body>
<h1>카테고리 목록</h1>

<div class="topbar">
    <a class="btn btn-primary" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
</div>

<p class="message success" th:if="${successMessage}" th:text="${successMessage}"></p>
<p class="message error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

<div th:if="${#lists.isEmpty(categories)}" class="empty">
    등록된 카테고리가 없습니다.
</div>

<table th:if="${!#lists.isEmpty(categories)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form class="delete-form" th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                  onsubmit="return confirm('정말 삭제할까요?')">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번:2171048 | 이름: 김상욱'}"></p>
</body>
</html>
